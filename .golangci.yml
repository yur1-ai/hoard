version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell

  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.DB).Close
        - (io.Closer).Close

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
